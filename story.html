<!DOCTYPE html>
<html lang="vi">
<head>

  <link rel="stylesheet" href="css/style.css">

<body>

<header>
  <div class="hdr-top">
    <a href="index.html" class="logo">
      <span class="logo-main">Lưu Ly Hiền Nhi Các</span>
      <span class="logo-slogan">Gác ngọc thanh vân, lưu vạn trang mộng</span>

    <nav class="hdr-nav">
      <a href="index.html">Trang Chủ</a>
      <a href="index.html?genre=Tiên+Hiệp">Tiên Hiệp</a>
      <a href="index.html?genre=Huyền+Huyễn">Huyền Huyễn</a>

    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Tìm kiếm truyện, tác giả..."

<main class="container" style="padding-top:1.5rem">

<footer>
  <div class="footer-simple">
    <span>© 2026 Lưu Ly Hiền Nhi Các</span>

  </div>
</footer>

<script src="js/app.js"></script>
<script>
  loadStoryPage();
  window.addEventListener("hashchange", loadStoryPage);
  function doSearch() {
    const q = document.getElementById("search-input").value.trim();
    if (q) location.href = "index.html?search=" + encodeURIComponent(q);
  }
</script>
</body>
</html>
