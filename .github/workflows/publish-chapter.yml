name: Dang chuong moi hang ngay

on:
  schedule:
    # 14:00 UTC = 21:00 gio Viet Nam
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xuat ban chuong tu kho cho
        id: publish
        run: |
          node scripts/publish_chapter.js
          if [ -f published.txt ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "summary=$(cat published.txt)" >> "$GITHUB_OUTPUT"
            rm published.txt
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit va push
        if: steps.publish.outputs.published == 'true'
        run: |
          git config user.name "luu-ly-bot"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "Dang chuong moi tu dong: ${{ steps.publish.outputs.summary }}"
          git push

      - name: Bao Telegram
        if: steps.publish.outputs.published == 'true' && env.TG_TOKEN != ''
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            --data-urlencode "text=📖 Web đã tự đăng chương mới lúc 21h: ${{ steps.publish.outputs.summary }}
Đọc tại: https://luulyhnc.github.io/luulyhiennhicac/" || true
